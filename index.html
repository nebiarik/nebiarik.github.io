<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sana ❤️</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: 'Arial', sans-serif;
    background: linear-gradient(135deg, #ff5f6d, #ffc371);
    color: white;
    text-align: center;
}

/* Kalp animasyon */
.heart {
    position: fixed;
    color: red;
    font-size: 20px;
    animation: fall linear infinite;
}

@keyframes fall {
    0% {
        transform: translateY(-10vh);
        opacity: 1;
    }
    100% {
        transform: translateY(100vh);
        opacity: 0;
    }
}

.container {
    position: relative;
    top: 30vh;
    padding: 20px;
}

h1 {
    font-size: 8vw;
}

p {
    font-size: 5vw;
}

.button {
    margin-top: 20px;
    padding: 15px 25px;
    font-size: 5vw;
    border: none;
    border-radius: 10px;
    background: white;
    color: #ff4f81;
    cursor: pointer;
}

.hidden {
    display: none;
    margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">
    <h1>Seni Çok Seviyorum ❤️</h1>
    <p>Bu siteyi sadece senin için yaptım...</p>

    <button class="button" onclick="showMessage()">Mesajı Aç 💌</button>

    <p id="message" class="hidden">
        Hayatımın en güzel parçasısın 💕
    </p>
</div>

<script>
// Kalp üretme
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 3 + 2) + "s";
    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 5000);
}

setInterval(createHeart, 300);

// Mesaj açma
function showMessage() {
    document.getElementById("message").style.display = "block";
}
</script>

</body>
</html>
